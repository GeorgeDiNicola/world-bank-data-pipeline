services:
  spark-master:
    image: apache/spark:4.0.3
    container_name: spark-master
    environment:
      - PATH=/opt/spark/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - SPARK_MODE=master
    volumes:
      - ./data:/data
      - ./output:/output
    working_dir: /
    ports:
      - "4040:4040"
      - "7077:7077"
      - "8080:8080"
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --host spark-master

  spark-worker:
    image: apache/spark:4.0.3
    environment:
      - PATH=/opt/spark/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - SPARK_MODE=worker
      - SPARK_WORKER_CORES=${SPARK_WORKER_CORES:-1}
      - SPARK_WORKER_MEMORY=${SPARK_WORKER_MEMORY:-2g}
    volumes:
      - ./data:/data
      - ./output:/output
      - ./.spark-work:/spark/work
    working_dir: /
    depends_on:
      - spark-master
    command: >
      bash -lc "
        /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker --cores ${SPARK_WORKER_CORES:-1} --memory ${SPARK_WORKER_MEMORY:-2g} --work-dir /spark/work/$${HOSTNAME} spark://spark-master:7077
      "

  pipeline-job:
    image: ${PIPELINE_JOB_IMAGE:-georgedinicola/world-bank-pipeline-job}:${IMAGE_TAG:-latest}
    environment:
      - PYTHONPATH=/app/src
      - SPARK_MASTER_URL=${SPARK_MASTER_URL:-spark://spark-master:7077}
      - SPARK_SQL_SHUFFLE_PARTITIONS=${SPARK_SQL_SHUFFLE_PARTITIONS:-8}
      - SPARK_DRIVER_MEMORY=${SPARK_DRIVER_MEMORY:-1g}
      - SPARK_EXECUTOR_MEMORY=${SPARK_EXECUTOR_MEMORY:-1g}
      - SPARK_EXECUTOR_CORES=${SPARK_EXECUTOR_CORES:-1}
    volumes:
      - ./data:/data
      - ./output:/output
    working_dir: /
    depends_on:
      - spark-master
      - spark-worker
    command: >
      bash -lc "
        until timeout 1 bash -c '</dev/tcp/spark-master/7077'; do
          echo 'Waiting for Spark master...';
          sleep 2;
        done;
        spark-submit --master $${SPARK_MASTER_URL} --driver-memory $${SPARK_DRIVER_MEMORY} --executor-memory $${SPARK_EXECUTOR_MEMORY} --executor-cores $${SPARK_EXECUTOR_CORES} --conf spark.network.timeout=600s --conf spark.executor.heartbeatInterval=60s /app/src/main.py
      "
    profiles:
      - job

  package-job:
    image: ${PACKAGE_JOB_IMAGE:-georgedinicola/world-bank-package-job}:${IMAGE_TAG:-latest}
    environment:
      - KAGGLE_USERNAME=${KAGGLE_USERNAME:-}
      - KAGGLE_KEY=${KAGGLE_KEY:-}
      - KAGGLE_API_TOKEN=${KAGGLE_API_TOKEN:-}
    volumes:
      - ./output:/output
      - ./upload:/upload
    working_dir: /
    command: python /app/scripts/package_and_publish_data.py
    profiles:
      - job
